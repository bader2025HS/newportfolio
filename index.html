<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Basile Suliman | Portfolio</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: #f6fbf8;
      color: #12382b;
      overflow-x: hidden;
    }

    /* HEADER */

    .header {
      position: fixed;
      top: 18px;
      left: 22px;
      right: 22px;
      z-index: 9999;

      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;

      pointer-events: none;
    }

    .logo {
      pointer-events: auto;

      display: inline-flex;
      align-items: center;
      justify-content: center;

      padding: 15px 24px;
      border-radius: 16px;

      background: #dcefe7;
      color: #12382b;

      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .navbar {
      pointer-events: auto;

      position: relative;
      display: flex;
      align-items: stretch;

      background: #dcefe7;
      border-radius: 16px;
      overflow: hidden;
    }

    .slider {
      position: absolute;
      top: 0;
      left: 0;

      height: 100%;
      width: 0;

      background: #8ed4bf;
      border-radius: 16px;

      z-index: 1;

      transition:
        transform 0.35s cubic-bezier(0.22, 1, 0.36, 1),
        width 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .nav-link {
      position: relative;
      z-index: 2;

      padding: 15px 20px;

      color: #12382b;
      text-decoration: none;

      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* BASIC SECTIONS */

    section {
      min-height: 100vh;
      padding: 140px 7vw 80px;

      display: flex;
      align-items: center;
    }

    .section-inner {
      width: 100%;
    }

    h1 {
      font-size: clamp(4rem, 12vw, 10rem);
      line-height: 0.85;
      letter-spacing: -0.08em;
    }

    h2 {
      font-size: clamp(3rem, 8vw, 7rem);
      line-height: 0.9;
      letter-spacing: -0.06em;
    }

    /* GREEN SECTION PALETTE */

    #home {
      background: #1d4738;
      color: #f6fbf8;
    }

    #about {
      background: #f6fbf8;
      color: #12382b;
    }

    #experience {
      background: #ddefe7;
      color: #12382b;
    }

    #education {
      background: #f1f8f4;
      color: #12382b;
    }

    #skills {
      background: #cfe8dd;
      color: #12382b;
    }

    #activities {
      background: #e8f4ee;
      color: #12382b;
    }

    #work {
      background: #1f5644;
      color: #f6fbf8;
    }

    #gallery {
      background: #eef8f3;
      color: #12382b;
    }

    #contact {
      background: #d9ece3;
      color: #12382b;
    }

    /* RESPONSIVE */

    @media (max-width: 1100px) {
      .header {
        top: 12px;
        left: 12px;
        right: 12px;
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }

      .logo {
        padding: 13px 18px;
        border-radius: 14px;
        font-size: 0.72rem;
      }

      .navbar {
        width: 100%;
        overflow-x: auto;
        scrollbar-width: none;
        border-radius: 14px;
      }

      .navbar::-webkit-scrollbar {
        display: none;
      }

      .slider {
        border-radius: 14px;
      }

      .nav-link {
        padding: 14px 18px;
        font-size: 0.72rem;
      }

      section {
        padding: 150px 20px 80px;
      }
    }
  </style>
</head>

<body>

  <header class="header">
    <a href="#home" class="logo">Basile Suliman</a>

    <nav class="navbar" id="navbar">
      <span class="slider"></span>

      <a href="#home" class="nav-link active">Home</a>
      <a href="#about" class="nav-link">About</a>
      <a href="#experience" class="nav-link">Experience</a>
      <a href="#education" class="nav-link">Education</a>
      <a href="#skills" class="nav-link">Skills</a>
      <a href="#activities" class="nav-link">Activities</a>
      <a href="#work" class="nav-link">Work</a>
      <a href="#gallery" class="nav-link">Gallery</a>
      <a href="#contact" class="nav-link">Contact</a>
    </nav>
  </header>

  <main>
    <section id="home">
      <div class="section-inner">
        <h1>Basile<br>Suliman</h1>
      </div>
    </section>

    <section id="about">
      <div class="section-inner">
        <h2>About</h2>
      </div>
    </section>

    <section id="experience">
      <div class="section-inner">
        <h2>Experience</h2>
      </div>
    </section>

    <section id="education">
      <div class="section-inner">
        <h2>Education</h2>
      </div>
    </section>

    <section id="skills">
      <div class="section-inner">
        <h2>Skills</h2>
      </div>
    </section>

    <section id="activities">
      <div class="section-inner">
        <h2>Activities</h2>
      </div>
    </section>

    <section id="work">
      <div class="section-inner">
        <h2>Work</h2>
      </div>
    </section>

    <section id="gallery">
      <div class="section-inner">
        <h2>Gallery</h2>
      </div>
    </section>

    <section id="contact">
      <div class="section-inner">
        <h2>Contact</h2>
      </div>
    </section>
  </main>

  <script>
    const navbar = document.querySelector("#navbar");
    const slider = document.querySelector(".slider");
    const links = document.querySelectorAll(".nav-link");
    const sections = document.querySelectorAll("section[id]");

    function moveSlider(link) {
      if (!link || !navbar || !slider) return;

      const navRect = navbar.getBoundingClientRect();
      const linkRect = link.getBoundingClientRect();

      slider.style.width = linkRect.width + "px";
      slider.style.transform = `translateX(${linkRect.left - navRect.left}px)`;
    }

    function setActive(id) {
      links.forEach(link => {
        link.classList.toggle(
          "active",
          link.getAttribute("href") === "#" + id
        );
      });

      moveSlider(document.querySelector(".nav-link.active"));
    }

    links.forEach(link => {
      link.addEventListener("mouseenter", () => moveSlider(link));

      link.addEventListener("click", () => {
        const id = link.getAttribute("href").replace("#", "");
        setActive(id);
      });
    });

    navbar.addEventListener("mouseleave", () => {
      moveSlider(document.querySelector(".nav-link.active"));
    });

    window.addEventListener("scroll", () => {
      let current = "home";

      sections.forEach(section => {
        if (window.scrollY >= section.offsetTop - 180) {
          current = section.id;
        }
      });

      setActive(current);
    });

    window.addEventListener("resize", () => {
      moveSlider(document.querySelector(".nav-link.active"));
    });

    window.addEventListener("load", () => {
      moveSlider(document.querySelector(".nav-link.active"));
    });
  </script>

</body>
</html>
