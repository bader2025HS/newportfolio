<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Basile Suliman | Portfolio</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: #f7fbf8;
      color: #14382c;
      overflow-x: hidden;
    }

    .header {
      position: fixed;
      top: 22px;
      left: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      pointer-events: none;
    }

    .logo {
      pointer-events: auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 18px 28px;
      border-radius: 20px;
      background: #dcefe7;
      color: #14382c;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 900;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .navbar {
      pointer-events: auto;
      position: relative;
      display: flex;
      align-items: center;
      padding: 6px;
      border-radius: 20px;
      background: #dcefe7;
      overflow: hidden;
    }

    .slider {
      position: absolute;
      top: 6px;
      left: 6px;
      width: 0;
      height: calc(100% - 12px);
      border-radius: 15px;
      background: #95d4bd;
      z-index: 1;
      transition: transform 0.35s ease, width 0.35s ease;
    }

    .nav-link {
      position: relative;
      z-index: 2;
      padding: 14px 18px;
      border-radius: 15px;
      color: #14382c;
      text-decoration: none;
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    section {
      min-height: 100vh;
      padding: 140px 7vw 80px;
      display: flex;
      align-items: center;
    }

    section:nth-child(odd) {
      background: #f7fbf8;
    }

    section:nth-child(even) {
      background: #e8f4ee;
    }

    h1 {
      font-size: clamp(4rem, 12vw, 10rem);
      line-height: 0.85;
      letter-spacing: -0.08em;
    }

    h2 {
      font-size: clamp(3rem, 8vw, 7rem);
      letter-spacing: -0.06em;
    }

    @media (max-width: 1050px) {
      .header {
        top: 12px;
        left: 12px;
        right: 12px;
        flex-direction: column;
        align-items: flex-start;
      }

      .logo {
        padding: 14px 18px;
        border-radius: 16px;
        font-size: 0.72rem;
      }

      .navbar {
        width: 100%;
        overflow-x: auto;
        scrollbar-width: none;
        border-radius: 16px;
      }

      .navbar::-webkit-scrollbar {
        display: none;
      }

      .nav-link {
        padding: 13px 16px;
        font-size: 0.7rem;
      }

      section {
        padding: 150px 20px 80px;
      }
    }
  </style>
</head>

<body>

  <header class="header">
    <a href="#home" class="logo">Basile Suliman</a>

    <nav class="navbar" id="navbar">
      <span class="slider"></span>

      <a href="#home" class="nav-link active">Home</a>
      <a href="#about" class="nav-link">About</a>
      <a href="#experience" class="nav-link">Experience</a>
      <a href="#education" class="nav-link">Education</a>
      <a href="#skills" class="nav-link">Skills</a>
      <a href="#activities" class="nav-link">Activities</a>
      <a href="#work" class="nav-link">Work</a>
      <a href="#gallery" class="nav-link">Gallery</a>
      <a href="#contact" class="nav-link">Contact</a>
    </nav>
  </header>

  <main>
    <section id="home"><h1>Basile<br>Suliman</h1></section>
    <section id="about"><h2>About</h2></section>
    <section id="experience"><h2>Experience</h2></section>
    <section id="education"><h2>Education</h2></section>
    <section id="skills"><h2>Skills</h2></section>
    <section id="activities"><h2>Activities</h2></section>
    <section id="work"><h2>Work</h2></section>
    <section id="gallery"><h2>Gallery</h2></section>
    <section id="contact"><h2>Contact</h2></section>
  </main>

  <script>
    const navbar = document.querySelector("#navbar");
    const slider = document.querySelector(".slider");
    const links = document.querySelectorAll(".nav-link");
    const sections = document.querySelectorAll("section[id]");

    function moveSlider(link) {
      if (!link) return;

      const navRect = navbar.getBoundingClientRect();
      const linkRect = link.getBoundingClientRect();

      slider.style.width = linkRect.width + "px";
      slider.style.transform = `translateX(${linkRect.left - navRect.left}px)`;
    }

    function setActive(id) {
      links.forEach(link => {
        link.classList.toggle("active", link.getAttribute("href") === "#" + id);
      });

      moveSlider(document.querySelector(".nav-link.active"));
    }

    links.forEach(link => {
      link.addEventListener("mouseenter", () => moveSlider(link));

      link.addEventListener("click", () => {
        const id = link.getAttribute("href").replace("#", "");
        setActive(id);
      });
    });

    navbar.addEventListener("mouseleave", () => {
      moveSlider(document.querySelector(".nav-link.active"));
    });

    window.addEventListener("scroll", () => {
      let current = "home";

      sections.forEach(section => {
        if (window.scrollY >= section.offsetTop - 180) {
          current = section.id;
        }
      });

      setActive(current);
    });

    window.addEventListener("resize", () => {
      moveSlider(document.querySelector(".nav-link.active"));
    });

    window.addEventListener("load", () => {
      moveSlider(document.querySelector(".nav-link.active"));
    });
  </script>

</body>
</html>
